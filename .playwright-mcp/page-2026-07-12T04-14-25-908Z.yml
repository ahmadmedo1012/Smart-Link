          - region "ما هي منصة SmartLink؟":
            - paragraph [ref=f12e264]: SmartLink هي منصة رقمية متكاملة تجمع عدة خدمات ذكية تحت مظلة واحدة. حالياً نقدم خدمة Smart Menu (المنيو الرقمي للمطاعم) و SmartBot (البوت الذكي لفيسبوك)، مع خطط لإطلاق المزيد من الخدمات قريباً.
        - generic [ref=f12e265]:
          - button "هل الخدمة مجانية؟" [ref=f12e266]
          - region "هل الخدمة مجانية؟":
            - paragraph [ref=f12e270]: نعم، يمكنك البدء مجاناً تماماً بدون بطاقة ائتمان. نوفر خططاً مجانية للخدمات الأساسية، مع خطط مدفوعة للحصول على ميزات متقدمة وتحليلات أكثر.
        - generic [ref=f12e271]:
          - button "هل تدعمون اللغة العربية؟" [ref=f12e272]
          - region "هل تدعمون اللغة العربية؟":
            - paragraph [ref=f12e276]: بالتأكيد، المنصة بالكامل باللغة العربية مع دعم اللهجة الليبية في البوت الذكي. واجهات المستخدم، لوحات التحكم، والدعم الفني — كلها بالعربية.
        - generic [ref=f12e277]:
          - button "كيف يمكنني البدء؟" [ref=f12e278]
          - region "كيف يمكنني البدء؟":
            - paragraph [ref=f12e282]: فقط قم بإنشاء حساب مجاني، اختر الخدمة التي تناسبك (Smart Menu لمطعمك أو SmartBot لصفحتك على فيسبوك)، واتبع خطوات الإعداد السريعة. فريق الدعم لدينا جاهز لمساعدتك في أي وقت.
        - generic [ref=f12e283]:
