<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" lang="ar">
  <defs>
    <!-- Dark canvas gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#14141e"/>
      <stop offset="60%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#060609"/>
    </radialGradient>
    <!-- Orange accent glow -->
    <radialGradient id="accentGlow" cx="80%" cy="30%" r="70%">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45 / 0.18)"/>
      <stop offset="50%" stop-color="oklch(0.58 0.195 45 / 0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="secondaryGlow" cx="20%" cy="70%" r="60%">
      <stop offset="0%" stop-color="oklch(0.5 0.12 260 / 0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45)"/>
      <stop offset="100%" stop-color="oklch(0.72 0.18 50)"/>
    </linearGradient>
    <!-- Glass surface -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.18 0.006 30 / 0.35)"/>
      <stop offset="100%" stop-color="oklch(0.12 0.004 30 / 0.25)"/>
    </linearGradient>
    <linearGradient id="glassBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45 / 0.15)"/>
      <stop offset="100%" stop-color="oklch(0.58 0.195 45 / 0.04)"/>
    </linearGradient>
    <!-- Mesh gradient accent -->
    <radialGradient id="meshAccent" cx="65%" cy="55%" r="35%">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45 / 0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#accentGlow)"/>
  <rect width="1200" height="630" fill="url(#secondaryGlow)"/>
  <rect width="1200" height="630" fill="url(#meshAccent)"/>

  <!-- Grid pattern - subtle -->
  <g stroke="oklch(1 0 0 / 0.03)" stroke-width="0.5" fill="none">
    <g stroke-dasharray="1 6">
      <line x1="60" y1="0" x2="60" y2="630"/>
      <line x1="120" y1="0" x2="120" y2="630"/>
      <line x1="180" y1="0" x2="180" y2="630"/>
      <line x1="240" y1="0" x2="240" y2="630"/>
      <line x1="300" y1="0" x2="300" y2="630"/>
      <line x1="360" y1="0" x2="360" y2="630"/>
      <line x1="420" y1="0" x2="420" y2="630"/>
      <line x1="480" y1="0" x2="480" y2="630"/>
      <line x1="540" y1="0" x2="540" y2="630"/>
      <line x1="600" y1="0" x2="600" y2="630"/>
      <line x1="660" y1="0" x2="660" y2="630"/>
      <line x1="720" y1="0" x2="720" y2="630"/>
      <line x1="780" y1="0" x2="780" y2="630"/>
      <line x1="840" y1="0" x2="840" y2="630"/>
      <line x1="900" y1="0" x2="900" y2="630"/>
      <line x1="960" y1="0" x2="960" y2="630"/>
      <line x1="1020" y1="0" x2="1020" y2="630"/>
      <line x1="1080" y1="0" x2="1080" y2="630"/>
      <line x1="1140" y1="0" x2="1140" y2="630"/>
      <line x1="0" y1="60" x2="1200" y2="60"/>
      <line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="180" x2="1200" y2="180"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="360" x2="1200" y2="360"/>
      <line x1="0" y1="420" x2="1200" y2="420"/>
      <line x1="0" y1="480" x2="1200" y2="480"/>
      <line x1="0" y1="540" x2="1200" y2="540"/>
    </g>
  </g>

  <!-- Orbital accent rings - right side -->
  <g transform="translate(920, 280)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="220" ry="220" fill="none" stroke="url(#accent)" stroke-width="0.8" transform="rotate(25)"/>
    <ellipse cx="0" cy="0" rx="170" ry="170" fill="none" stroke="url(#accent)" stroke-width="0.5" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="url(#accent)" stroke-width="0.3" transform="rotate(50)"/>
  </g>

  <!-- Connecting nodes visualization -->
  <g opacity="0.08" filter="url(#glow)">
    <!-- Node connections -->
    <line x1="200" y1="100" x2="350" y2="200" stroke="oklch(0.58 0.195 45)" stroke-width="1"/>
    <line x1="350" y1="200" x2="250" y2="350" stroke="oklch(0.58 0.195 45)" stroke-width="0.8"/>
    <line x1="350" y1="200" x2="500" y2="180" stroke="oklch(0.58 0.195 45)" stroke-width="0.8"/>
    <line x1="500" y1="180" x2="450" y2="300" stroke="oklch(0.58 0.195 45)" stroke-width="0.6"/>
    <line x1="250" y1="350" x2="380" y2="400" stroke="oklch(0.58 0.195 45)" stroke-width="0.6"/>
    <!-- Nodes -->
    <circle cx="200" cy="100" r="3" fill="oklch(0.58 0.195 45)"/>
    <circle cx="350" cy="200" r="4" fill="oklch(0.58 0.195 45)"/>
    <circle cx="250" cy="350" r="2.5" fill="oklch(0.58 0.195 45)"/>
    <circle cx="500" cy="180" r="2.5" fill="oklch(0.58 0.195 45)"/>
    <circle cx="450" cy="300" r="2" fill="oklch(0.58 0.195 45)"/>
    <circle cx="380" cy="400" r="2" fill="oklch(0.58 0.195 45)"/>
  </g>

  <!-- Glass card for badge -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="180" height="32" rx="16" fill="oklch(0.58 0.195 45 / 0.08)" stroke="oklch(0.58 0.195 45 / 0.12)" stroke-width="0.5"/>
    <text x="90" y="21" fill="oklch(0.58 0.195 45)" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.5">منصة رقمية متكاملة</text>
  </g>

  <!-- Brand name with enhanced styling -->
  <text x="80" y="210" fill="#ffffff" font-family="system-ui" font-size="52" font-weight="800" letter-spacing="-1.5">Smart</text>
  <text x="80" y="282" fill="url(#accent)" font-family="system-ui" font-size="64" font-weight="900" letter-spacing="-2">Link</text>

  <!-- Tagline -->
  <text x="80" y="330" fill="oklch(0.65 0.015 30)" font-family="system-ui" font-size="17" font-weight="500" letter-spacing="0.3">الربط الذكي لتقنية المعلومات</text>

  <!-- Service pills -->
  <g transform="translate(80, 385)">
    <!-- Smart Menu pill -->
    <rect x="0" y="0" width="140" height="38" rx="19" fill="url(#glass)" stroke="url(#glassBorder)" stroke-width="0.5"/>
    <g transform="translate(16, 12)">
      <rect x="0" y="0" width="14" height="14" rx="4" fill="oklch(0.7 0.19 60 / 0.3)"/>
      <circle cx="7" cy="7" r="3" fill="oklch(0.7 0.19 60)"/>
    </g>
    <text x="42" y="25" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">Smart Menu</text>

    <!-- SmartBot pill -->
    <rect x="155" y="0" width="140" height="38" rx="19" fill="url(#glass)" stroke="url(#glassBorder)" stroke-width="0.5"/>
    <g transform="translate(171, 12)">
      <rect x="0" y="0" width="14" height="14" rx="4" fill="oklch(0.55 0.15 280 / 0.3)"/>
      <circle cx="7" cy="7" r="3" fill="oklch(0.55 0.15 280)"/>
    </g>
    <text x="197" y="25" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">Smart Bot</text>
  </g>

  <!-- Bottom divider -->
  <line x1="80" y1="560" x2="500" y2="560" stroke="oklch(0.58 0.195 45 / 0.1)" stroke-width="0.5"/>
  <text x="80" y="588" fill="oklch(0.5 0.008 30)" font-family="system-ui" font-size="13" font-weight="500">smart-link.ly</text>

  <!-- Scatter particles -->
  <g fill="oklch(0.58 0.195 45)" opacity="0.06">
    <circle cx="150" cy="480" r="2"/><circle cx="650" cy="80" r="2.5"/>
    <circle cx="800" cy="530" r="1.8"/><circle cx="1050" cy="90" r="2"/>
    <circle cx="1100" cy="550" r="1.5"/><circle cx="400" cy="530" r="1.2"/>
    <circle cx="700" cy="580" r="1"/><circle cx="960" cy="450" r="1.3"/>
    <circle cx="520" cy="60" r="1.5"/><circle cx="150" cy="150" r="1"/>
  </g>
</svg>
