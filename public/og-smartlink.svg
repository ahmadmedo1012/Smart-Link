<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#14141e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45 / 0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45)"/>
      <stop offset="100%" stop-color="oklch(0.68 0.19 45)"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="oklch(0.58 0.195 45 / 0.04)"/>
      <stop offset="100%" stop-color="oklch(0.58 0.195 45 / 0.01)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="oklch(0.58 0.195 45 / 0.04)" stroke-width="0.5" fill="none">
    <g stroke-dasharray="2 4">
      <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
      <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
      <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
      <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
      <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
      <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
      <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
      <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
      <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
      <line x1="1140" y1="0" x2="1140" y2="630"/>
      <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
      <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
      <line x1="0" y1="540" x2="1200" y2="540"/>
    </g>
  </g>

  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Orbital accent rings -->
  <g transform="translate(900, 200)" opacity="0.12">
    <ellipse cx="0" cy="0" rx="180" ry="180" fill="none" stroke="url(#accent)" stroke-width="0.8" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="150" ry="150" fill="none" stroke="url(#accent)" stroke-width="0.5" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="url(#accent)" stroke-width="0.3" transform="rotate(45)"/>
  </g>

  <!-- Small scatter dots -->
  <g fill="oklch(0.58 0.195 45)" opacity="0.06">
    <circle cx="150" cy="120" r="2"/><circle cx="280" cy="560" r="1.5"/>
    <circle cx="800" cy="80" r="2.5"/><circle cx="1050" cy="500" r="1.8"/>
    <circle cx="400" cy="70" r="1.2"/><circle cx="1100" cy="150" r="2"/>
    <circle cx="50" cy="400" r="1.5"/><circle cx="700" cy="580" r="1"/>
    <circle cx="960" cy="350" r="1.3"/><circle cx="320" cy="300" r="0.8"/>
  </g>

  <!-- Content -->
  <!-- Badge -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="160" height="28" rx="14" fill="oklch(0.58 0.195 45 / 0.1)" stroke="oklch(0.58 0.195 45 / 0.15)" stroke-width="0.5"/>
    <text x="80" y="18" fill="oklch(0.58 0.195 45)" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="1">منصة رقمية متكاملة</text>
  </g>

  <!-- Brand name -->
  <text x="80" y="210" fill="white" font-family="system-ui" font-size="48" font-weight="800" letter-spacing="-0.5">Smart</text>
  <text x="80" y="270" fill="url(#accent)" font-family="system-ui" font-size="56" font-weight="900" letter-spacing="-1">Link</text>

  <!-- Tagline RTL -->
  <text x="80" y="310" fill="oklch(0.6 0.012 30)" font-family="system-ui" font-size="16" font-weight="500" letter-spacing="0.3">الربط الذكي لتقنية المعلومات</text>

  <!-- Services -->
  <g transform="translate(80, 360)">
    <rect x="0" y="0" width="120" height="32" rx="8" fill="oklch(0.085 0.004 30 / 0.5)" stroke="oklch(0.58 0.195 45 / 0.08)" stroke-width="0.5"/>
    <text x="60" y="21" fill="oklch(0.95 0.003 30)" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">Smart Menu</text>
    <rect x="130" y="0" width="120" height="32" rx="8" fill="oklch(0.085 0.004 30 / 0.5)" stroke="oklch(0.58 0.195 45 / 0.08)" stroke-width="0.5"/>
    <text x="190" y="21" fill="oklch(0.95 0.003 30)" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">Smart Bot</text>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="560" x2="400" y2="560" stroke="oklch(0.58 0.195 45 / 0.15)" stroke-width="0.5"/>
  <text x="80" y="585" fill="oklch(0.5 0.008 30)" font-family="system-ui" font-size="12" font-weight="400">smart-link.ly</text>
</svg>
